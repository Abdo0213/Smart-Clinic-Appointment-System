server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:5005
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AuthenticationFilter

        - id: user-service
          uri: http://localhost:5005
          predicates:
            - Path=/api/users/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin

        - id: admin-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/admin/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin

        - id: patient-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/patients/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Doctor, Receptionist, Patient

        - id: doctor-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/doctors/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Doctor, Receptionist

        - id: appointment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/appointments/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Doctor, Receptionist, Patient

        - id: visit-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/visits/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Doctor

        - id: billing-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/billing/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Receptionist

jwt:
  secret: YourSuperSecretKeyHere12345-MustBeLongerThan32Chars
