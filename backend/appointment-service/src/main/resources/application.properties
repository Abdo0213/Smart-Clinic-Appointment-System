spring.application.name=appointment-service

server.port=8084

# ============================================================================
# DATABASE (PostgreSQL)
# ============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/clinic_db
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# FLYWAY (Database migrations)
# ============================================================================
spring.flyway.enabled=false



# ============================================================================
# EXTERNAL SERVICES
# ============================================================================
services.doctor.url=http://localhost:8082/doctors
services.patient.url=http://localhost:8083/patients

# ============================================================================
# LOGGING
# ============================================================================
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.com.example.appointmentservice=DEBUG

# ============================================================================
# ACTUATOR
# ============================================================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ============================================================================
# OPENAPI / SWAGGER UI
# ============================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
