services:
  auth.api:
    image: ${DOCKER_REGISTRY-}authapi
    build:
      context: .
      dockerfile: AuthService/Auth.Api/Dockerfile
    networks:
      - backend
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_NAME=dms_customer
      - DB_USER=postgres
      - DB_PASSWORD=password@12345#
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5005:8080"

  auth-db:
    container_name: auth-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dms_customer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password@12345#
    networks:
      - backend
    ports:
      - "18001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dms_customer"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    driver: bridge