spring.application.name=visit-service
server.port=8085

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.baseline-on-migrate=true


# External Services
services.patient.url=${PATIENT_SERVICE_URL:http://localhost:8083/patients}
services.doctor.url=${DOCTOR_SERVICE_URL:http://localhost:8082/doctors}
services.appointment.url=${APPOINTMENT_SERVICE_URL:http://localhost:8084/appointments}
services.billing.url=${BILLING_SERVICE_URL:http://localhost:8087/billing/invoices}

# AWS S3 (Placeholders for now, or use localstack/mock if needed)
aws.s3.bucket-name=${AWS_S3_BUCKET}
aws.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}

# Logging
logging.level.com.clinic.visit_service=DEBUG
