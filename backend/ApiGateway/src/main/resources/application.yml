server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:5005}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AuthenticationFilter

        - id: user-service
          uri: ${AUTH_SERVICE_URL:http://localhost:5005}
          predicates:
            - Path=/api/users/**
          filters:
            - name: AuthenticationFilter
              args:
                roles: Admin, Receptionist

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin

        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/patients/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Receptionist,Patient

        - id: doctor-service
          uri: ${DOCTOR_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/doctors/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Receptionist,Patient

        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/appointments/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Receptionist,Patient

        - id: visit-service
          uri: ${VISIT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/visits/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Patient

        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/billing/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Receptionist,Patient

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - name: AuthenticationFilter
              args:
                roles: Admin,Doctor,Receptionist,Patient
        - id: health-check
          uri: https://httpbin.org/get
          predicates:
            - Path=/health
          filters:
            - SetStatus=200

jwt:
  secret: ${JWT_KEY}